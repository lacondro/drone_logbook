# WIZGENE Drone Logbook — NAS / Portainer deployment (single shared log folder).
#
# This expects the image `drone-logbook:latest` to ALREADY be present in the
# NAS's Docker (loaded from a tar you built on your PC — see README/instructions),
# so the NAS never compiles anything; it just runs the prebuilt image.
#
# 1) Build on your PC:   docker build -t drone-logbook:latest .
# 2) Export:             docker save drone-logbook:latest -o drone-logbook.tar
# 3) Portainer → Images → Import → upload drone-logbook.tar
# 4) Edit the volume line below to your NAS log share, then
#    Portainer → Stacks → Add stack → Web editor → paste this → Deploy.
# 5) Open http://<NAS-IP>:8137  and click Scan.

services:
  logbook:
    image: drone-logbook:latest
    container_name: drone-logbook
    ports:
      - "8137:8137"
    volumes:
      # LEFT = path to your flight logs on the NAS  →  RIGHT = fixed path in container
      - /volume1/WizFlightHub/logs:/logs
    environment:
      - LOGBOOK_DEFAULT_FOLDER=/logs
      # Timezone for displayed local times (optional)
      - TZ=Asia/Seoul
    restart: unless-stopped
